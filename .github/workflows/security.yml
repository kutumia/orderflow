name: Security Scanning

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

defaults:
  run:
    shell: bash

jobs:
  # ── Dependency vulnerability audit ───────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high --json | tee npm-audit.json || true

      - name: Fail on critical vulnerabilities
        run: |
          CRITICAL=$(cat npm-audit.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo 0)
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities. Run 'npm audit fix' to resolve."
            exit 1
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json

  # ── Secret scanning ───────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: false

  # ── SAST — Static Application Security Testing ───────────────────────────
  sast:
    name: SAST Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ── License compliance check ─────────────────────────────────────────────
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install license checker
        run: npm install -g license-checker

      - name: Check licenses
        run: |
          license-checker --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;CC0-1.0;Unlicense;0BSD;BlueOak-1.0.0" \
            --excludePrivatePackages \
            --json \
            --out license-report.json || {
            echo "::error::Unlicensed or disallowed license found. Review license-report.json"
            exit 1
          }

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report.json

  # ── Environment variable validation ──────────────────────────────────────
  env-validation:
    name: Environment Configuration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify .env.example completeness
        run: |
          echo "Checking .env.example for required variables..."
          REQUIRED_VARS=(
            "NEXT_PUBLIC_SUPABASE_URL"
            "NEXT_PUBLIC_SUPABASE_ANON_KEY"
            "SUPABASE_SERVICE_ROLE_KEY"
            "NEXTAUTH_SECRET"
            "NEXTAUTH_URL"
            "STRIPE_SECRET_KEY"
            "STRIPE_WEBHOOK_SECRET"
            "INTERNAL_API_SECRET"
            "CRON_SECRET"
            "UPSTASH_REDIS_REST_URL"
            "UPSTASH_REDIS_REST_TOKEN"
            "API_GATEWAY_API_KEY"
          )
          MISSING=()
          for VAR in "${REQUIRED_VARS[@]}"; do
            if ! grep -q "^${VAR}=" .env.example; then
              MISSING+=("$VAR")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing variables in .env.example: ${MISSING[*]}"
            exit 1
          fi
          echo "All required variables present in .env.example"

      - name: Check for hardcoded secrets patterns
        run: |
          # Patterns that look like hardcoded secrets (not env var references)
          PATTERNS=(
            'sk_live_[a-zA-Z0-9]{24}'
            'sk_test_[a-zA-Z0-9]{24}'
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[a-zA-Z0-9_-]{20,}'
            'AAAA[a-zA-Z0-9_-]{60,}'
          )
          for PATTERN in "${PATTERNS[@]}"; do
            if grep -rE "$PATTERN" --include="*.ts" --include="*.tsx" --include="*.js" \
               --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.next .; then
              echo "::error::Possible hardcoded secret detected"
              exit 1
            fi
          done
          echo "No hardcoded secrets detected"

  # ── Security summary ─────────────────────────────────────────────────────
  security-summary:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [dependency-audit, secret-scan, sast, license-check, env-validation]
    if: always()
    steps:
      - name: Check all security jobs
        run: |
          echo "dependency-audit: ${{ needs.dependency-audit.result }}"
          echo "secret-scan: ${{ needs.secret-scan.result }}"
          echo "sast: ${{ needs.sast.result }}"
          echo "license-check: ${{ needs.license-check.result }}"
          echo "env-validation: ${{ needs.env-validation.result }}"

          # Fail if any required job failed
          REQUIRED_JOBS=("dependency-audit" "secret-scan" "license-check" "env-validation")
          FAILED=false
          for JOB in "${REQUIRED_JOBS[@]}"; do
            RESULT=$(echo "${{ toJSON(needs) }}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('$JOB', {}).get('result', 'unknown'))" 2>/dev/null || echo "unknown")
            if [ "$RESULT" = "failure" ]; then
              echo "::error::Security job $JOB FAILED"
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then
            exit 1
          fi
          echo "All security gates passed"
