name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

defaults:
  run:
    shell: bash

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo run lint --continue

      - name: Typecheck
        run: npx turbo run typecheck --continue

      - name: Test
        run: npx turbo run test --continue

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web apps
        run: npx turbo run build --filter=web --filter=printbridge-web --continue
